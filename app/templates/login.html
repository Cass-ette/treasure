{% extends "base.html" %}

{% block title %}登录 - Treasure{% endblock %}

{% block navbar %}{% endblock %}

{% block main %}
<div class="login-page">
    <div class="login-card">
        <div class="text-center mb-3">
            <i class="bi bi-bar-chart-fill" style="font-size: 2.5rem; color: var(--color-primary);"></i>
        </div>
        <div class="login-title">Treasure</div>
        <div class="login-subtitle">多账户投资管理系统</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-accent w-100 py-2">登录</button>
        </form>
    </div>
</div>
{% endblock %}
