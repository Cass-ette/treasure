{% extends "base.html" %}

{% block title %}图片识别基金{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1><i class="bi bi-image" style="color: var(--color-accent);"></i> 图片识别基金</h1>
    </div>
    <p class="text-muted mb-4">上传截图，自动识别基金信息并从天天基金网查询，选择导入</p>

    <!-- Upload Zone -->
    <div class="upload-zone mb-3" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.gif" onchange="onFileSelected(this)">
        <div id="upload-hint">
            <i class="bi bi-cloud-arrow-up" style="font-size: 2.5rem; color: var(--color-text-muted);"></i>
            <p class="mt-2 mb-0 text-muted">点击或拖拽图片到此处<br><small>支持 PNG / JPG / JPEG / GIF</small></p>
        </div>
        <img id="preview" class="preview-img" style="display:none">
    </div>

    <div id="loading">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">正在识别图片并搜索基金...</p>
    </div>

    <!-- Results -->
    <div id="section-results">
        <div id="keywords-box" class="mb-3" style="display:none">
            <small class="text-muted">识别到的关键词：</small>
            <div id="keywords"></div>
        </div>

        <div id="manual-search">
            <input type="text" class="form-control form-control-sm" id="manual-input" placeholder="手动输入基金代码或名称补充搜索">
            <button class="btn btn-accent btn-sm" onclick="manualSearch()">搜索</button>
        </div>

        <div id="no-funds" class="text-center text-muted py-3" style="display:none">未找到匹配基金，可尝试手动搜索</div>
        <div id="fund-list"></div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
// Drag & drop
var zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('drag-over');
    var file = e.dataTransfer.files[0];
    if (file) processFile(file);
});

function onFileSelected(input) {
    if (input.files[0]) processFile(input.files[0]);
}

function processFile(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('upload-hint').style.display = 'none';
        var img = document.getElementById('preview');
        img.src = e.target.result;
        img.style.display = 'block';
    };
    reader.readAsDataURL(file);

    document.getElementById('loading').style.display = 'block';
    document.getElementById('section-results').style.display = 'none';

    var fd = new FormData();
    fd.append('file', file);

    fetch('{{ url_for("image.recognize") }}', { method: 'POST', body: fd })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('section-results').style.display = 'block';

        if (!data.success) {
            document.getElementById('no-funds').textContent = data.message;
            document.getElementById('no-funds').style.display = 'block';
            document.getElementById('fund-list').innerHTML = '';
            document.getElementById('keywords-box').style.display = 'none';
            return;
        }

        if (data.keywords && data.keywords.length) {
            document.getElementById('keywords-box').style.display = 'block';
            document.getElementById('keywords').innerHTML =
                data.keywords.map(function(k) { return '<span class="keyword-tag">' + escHtml(k) + '</span>'; }).join('');
        }

        renderFunds(data.funds, false);
    })
    .catch(function() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('section-results').style.display = 'block';
        document.getElementById('no-funds').textContent = '识别失败，请重试';
        document.getElementById('no-funds').style.display = 'block';
    });
}

function manualSearch() {
    var kw = document.getElementById('manual-input').value.trim();
    if (!kw) return;
    var fd = new FormData();
    fd.append('keyword', kw);
    fetch('{{ url_for("image.search_fund") }}', { method: 'POST', body: fd })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        document.getElementById('section-results').style.display = 'block';
        renderFunds(data.funds || [], true);
    });
}

document.getElementById('manual-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') manualSearch();
});

function renderFunds(funds, append) {
    var list = document.getElementById('fund-list');
    var noFunds = document.getElementById('no-funds');
    if (!append) list.innerHTML = '';

    if (!funds || funds.length === 0) {
        if (!append) {
            noFunds.textContent = '未找到匹配基金，可尝试手动搜索';
            noFunds.style.display = 'block';
        }
        return;
    }

    noFunds.style.display = 'none';

    funds.forEach(function(fund) {
        if (document.getElementById('fund-' + fund.code)) return;

        var card = document.createElement('div');
        card.className = 'fund-card' + (fund.in_system ? ' in-system' : '');
        card.id = 'fund-' + fund.code;

        var action = fund.in_system
            ? '<span class="badge-in-system">已导入</span>'
            : '<button class="btn btn-accent btn-sm" id="btn-' + fund.code + '" onclick="importFund(\'' +
              fund.code + '\',\'' + escHtml(fund.name) + '\',\'' + escHtml(fund.type||'') + '\',\'' +
              (fund.nav||'') + '\',\'' + (fund.nav_date||'') + '\')">导入</button>';

        card.innerHTML =
            '<div class="fund-info">' +
            '  <div><span class="fund-name">' + escHtml(fund.name) + '</span> <span class="fund-code">' + fund.code + '</span></div>' +
            '  <div class="fund-meta">' +
            (fund.type ? fund.type + ' · ' : '') +
            (fund.nav ? '净值 ' + fund.nav + ' · ' : '') +
            (fund.nav_date || '') +
            (fund.company ? ' · ' + fund.company : '') +
            '  </div>' +
            '</div>' +
            '<div>' + action + '</div>';

        list.appendChild(card);
    });
}

function importFund(code, name, type, nav, nav_date) {
    var btn = document.getElementById('btn-' + code);
    btn.disabled = true;
    btn.textContent = '导入中...';

    var fd = new FormData();
    fd.append('code', code);
    fd.append('name', name);
    fd.append('type', type);
    fd.append('nav', nav);
    fd.append('nav_date', nav_date);

    fetch('{{ url_for("image.import_fund") }}', { method: 'POST', body: fd })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            btn.outerHTML = '<span class="badge-in-system">已导入</span>';
            document.getElementById('fund-' + code).classList.add('in-system');
        } else {
            alert(data.message);
            btn.disabled = false;
            btn.textContent = '导入';
        }
    });
}

function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
{% endblock %}
